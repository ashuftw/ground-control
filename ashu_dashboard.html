<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study & Research Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeecea;
    --bg-info: #E6F1FB; --bg-success: #EAF3DE; --bg-warning: #FAEEDA; --bg-danger: #FCEBEB;
    --text: #1a1a18; --text-secondary: #6b6b67; --text-tertiary: #9b9b97;
    --text-info: #185FA5; --text-success: #3B6D11; --text-warning: #854F0B; --text-danger: #A32D2D;
    --border: rgba(0,0,0,0.12); --border-secondary: rgba(0,0,0,0.22);
    --border-info: rgba(24,95,165,0.4); --border-success: rgba(59,109,17,0.4);
    --radius-md: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2c;
      --bg-info: #0c1e33; --bg-success: #101f06; --bg-warning: #261800; --bg-danger: #1f0808;
      --text: #e8e8e4; --text-secondary: #9b9b97; --text-tertiary: #6b6b67;
      --text-info: #85B7EB; --text-success: #97C459; --text-warning: #FAC775; --text-danger: #F09595;
      --border: rgba(255,255,255,0.1); --border-secondary: rgba(255,255,255,0.2);
      --border-info: rgba(133,183,235,0.4); --border-success: rgba(151,196,89,0.4);
    }
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; line-height: 1.5; }
  .container { max-width: 720px; margin: 0 auto; }

  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
  header h1 { font-size: 1.5rem; font-weight: 650; letter-spacing: -0.02em; }
  header .sub { color: var(--text-secondary); font-size: 0.85rem; }
  .sync-state { font-size: 0.75rem; color: var(--text-tertiary); display: flex; align-items: center; gap: 0.35rem; }
  .sync-state .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); }
  .sync-state.live .dot { background: var(--text-success); }
  .sync-state.local .dot { background: var(--text-warning); }
  .header-right { display: flex; align-items: center; gap: 0.6rem; }
  .sync-btn { display: flex; align-items: center; gap: 0.35rem; background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.35rem 0.6rem; font-size: 0.78rem; font-weight: 550; cursor: pointer; font-family: var(--font); }
  .sync-btn:hover { background: var(--bg-secondary); }
  .sync-btn:disabled { opacity: 0.6; cursor: default; }
  .sync-btn.syncing svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .icon { width: 1em; height: 1em; vertical-align: -0.12em; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 1.25rem; }
  .metric { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.7rem 0.8rem; }
  .metric .num { font-size: 1.4rem; font-weight: 650; letter-spacing: -0.02em; }
  .metric .lbl { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }

  .section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); margin: 1.5rem 0 0.7rem; font-weight: 600; }

  .deadlines { display: flex; flex-direction: column; gap: 0.5rem; }
  .deadline { display: flex; align-items: center; gap: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.7rem 0.85rem; }
  .deadline .count { min-width: 56px; text-align: center; }
  .deadline .count .n { font-size: 1.35rem; font-weight: 700; line-height: 1; }
  .deadline .count .u { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); }
  .deadline .body { flex: 1; min-width: 0; }
  .deadline .body .t { font-weight: 550; font-size: 0.95rem; }
  .deadline .body .d { font-size: 0.78rem; color: var(--text-secondary); }
  .deadline .bar { margin-top: 0.4rem; height: 4px; border-radius: 999px; background: var(--bg-tertiary); overflow: hidden; }
  .deadline .bar span { display: block; height: 100%; border-radius: 999px; background: var(--text-tertiary); transition: width 0.4s ease; }
  .deadline.soon .bar span { background: var(--text-warning); }
  .deadline.urgent .bar span { background: var(--text-danger); }
  .deadline.urgent { background: var(--bg-danger); border-color: var(--border); }
  .deadline.urgent .n, .deadline.urgent .u { color: var(--text-danger); }
  .deadline.soon { background: var(--bg-warning); }
  .deadline.soon .n, .deadline.soon .u { color: var(--text-warning); }
  .deadline .block-btn { background: var(--bg-info); color: var(--text-info); border: 1px solid var(--border-info); border-radius: var(--radius-md); padding: 0.35rem 0.6rem; font-size: 0.75rem; cursor: pointer; white-space: nowrap; font-weight: 550; }
  .deadline .block-btn:hover { filter: brightness(0.97); }

  .hiwis { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
  @media (max-width: 600px) { .hiwis { grid-template-columns: 1fr; } .metrics { grid-template-columns: repeat(2, 1fr); } }
  .hiwi { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0.9rem; }
  .hiwi h3 { font-size: 0.95rem; font-weight: 650; margin-bottom: 0.15rem; }
  .hiwi .loc { font-size: 0.72rem; color: var(--text-tertiary); margin-bottom: 0.75rem; }

  .horizon { margin-bottom: 0.7rem; }
  .horizon .h-lbl { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.3rem; font-weight: 600; }
  .task { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.3rem 0; font-size: 0.88rem; }
  .task .check { width: 16px; height: 16px; border: 1.5px solid var(--border-secondary); border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; }
  .task .check.done { background: var(--text-success); border-color: var(--text-success); color: #fff; }
  .task .check.done svg { width: 11px; height: 11px; stroke-width: 3; }
  .task .txt { flex: 1; min-width: 0; }
  .task.complete .txt { text-decoration: line-through; color: var(--text-tertiary); }
  .task .del { opacity: 0; color: var(--text-tertiary); cursor: pointer; font-size: 0.9rem; flex-shrink: 0; background: none; border: none; }
  .task:hover .del { opacity: 1; }
  .task .del:hover { color: var(--text-danger); }

  .add-row { margin-top: 0.5rem; }
  .add-toggle { font-size: 0.78rem; color: var(--text-info); cursor: pointer; background: none; border: none; padding: 0.2rem 0; display: flex; align-items: center; gap: 0.3rem; }
  .add-form { display: none; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
  .add-form.open { display: flex; }
  .add-form input, .add-form select { width: 100%; padding: 0.4rem 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text); font-size: 0.82rem; font-family: var(--font); }
  .add-form .btns { display: flex; gap: 0.4rem; }
  .add-form button { flex: 1; padding: 0.4rem; border-radius: var(--radius-md); border: 1px solid var(--border); cursor: pointer; font-size: 0.8rem; font-weight: 550; font-family: var(--font); }
  .add-form .confirm { background: var(--text-success); color: #fff; border-color: var(--text-success); }
  .add-form .cancel { background: var(--bg-secondary); color: var(--text-secondary); }

  .empty { font-size: 0.78rem; color: var(--text-tertiary); font-style: italic; padding: 0.2rem 0; }
  footer { margin-top: 1.75rem; text-align: center; font-size: 0.72rem; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>Study Dashboard</h1>
      <div class="sub" id="today-str"></div>
    </div>
    <div class="header-right">
      <div class="sync-state local" id="sync"><span class="dot"></span><span id="sync-txt">Local mode</span></div>
      <button class="sync-btn" id="sync-btn" onclick="syncCalendar()"><svg class="icon" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-.5 4"/><path d="M20 5v6h-6"/></svg> Sync calendar</button>
    </div>
  </header>

  <div class="metrics" id="metrics"></div>

  <div class="section-title">Deadlines</div>
  <div class="deadlines" id="deadlines"></div>

  <div class="section-title">HiWi work</div>
  <div class="hiwis" id="hiwis"></div>

  <footer>Tasks saved in this browser · Calendar syncs when run inside Claude</footer>
</div>

<script>
const ICON_PLUS  = '<svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>';
const ICON_CHECK = '<svg class="icon" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>';
const ICON_X     = '<svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>';
const STORAGE_KEY = 'hiwi-tasks-v1';
const HORIZONS = [
  { id: 'today', label: 'Today' },
  { id: 'next', label: 'Next up' },
  { id: 'pending', label: 'Pending' },
  { id: 'backlog', label: 'Backlog' },
];

// Seeded from Google Calendar (submission / deadline / exam keywords). Overwritten live on sync.
let deadlines = [
  { title: 'Semester Registration', date: '2026-06-30', type: 'deadline' },
  { title: 'Scholarship Application', date: '2026-06-30', type: 'deadline' },
  { title: 'Course Project Submission', date: '2026-06-30', type: 'submission' },
  { title: 'Fluid Dynamics Exam', date: '2026-07-24', type: 'exam' },
  { title: 'Environmental Chemistry Exam', date: '2026-08-04', type: 'exam' },
  { title: 'Sustainable Energy Exam', date: '2026-08-05', type: 'exam' },
  { title: 'Materials Science Exam', date: '2026-08-07', type: 'exam' },
  { title: 'Energy Economics Exam', date: '2026-08-11', type: 'exam' },
];

const defaultTasks = {
  tubs: {
    today:   [{ id: 't1', text: 'Plan next weeks task list', done: false }],
    next:    [{ id: 't2', text: 'Document and run code', done: false }],
    pending: [],
    backlog: [],
  },
  tub: {
    today:   [{ id: 't3', text: 'Arrange IWF literature meeting', done: false }],
    next:    [{ id: 't4', text: 'Implement vacuum swing', done: false }],
    pending: [{ id: 't5', text: 'CO₂ sequestration research questions', done: false }],
    backlog: [],
  },
};

const HIWIS = [
  { id: 'tubs', name: 'University A', loc: 'Lab Assistant' },
  { id: 'tub', name: 'University B', loc: 'Research Assistant · remote' },
];

let tasks = loadTasks();

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(defaultTasks));
}
function saveTasks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (e) {}
}
function uid() { return 'k' + Math.random().toString(36).slice(2, 9); }

function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return Math.round((d - today) / 86400000);
}

function renderHeader() {
  document.getElementById('today-str').textContent =
    new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

function renderMetrics() {
  let total = 0, done = 0;
  Object.values(tasks).forEach(h => Object.values(h).forEach(list => list.forEach(t => { total++; if (t.done) done++; })));
  const next = [...deadlines].map(d => daysUntil(d.date)).filter(n => n >= 0).sort((a,b)=>a-b)[0];
  const metrics = [
    { num: total - done, lbl: 'Open tasks' },
    { num: done, lbl: 'Done' },
    { num: deadlines.length, lbl: 'Deadlines' },
    { num: next === undefined ? '–' : next, lbl: 'Days to next' },
  ];
  document.getElementById('metrics').innerHTML = metrics.map(m =>
    `<div class="metric"><div class="num">${m.num}</div><div class="lbl">${m.lbl}</div></div>`).join('');
}

function renderDeadlines() {
  const sorted = [...deadlines].sort((a,b) => daysUntil(a.date) - daysUntil(b.date));
  document.getElementById('deadlines').innerHTML = sorted.map(d => {
    const n = daysUntil(d.date);
    const cls = n < 0 ? '' : n <= 3 ? 'urgent' : n <= 7 ? 'soon' : '';
    const label = n < 0 ? 'past' : n === 0 ? 'today' : n === 1 ? 'day' : 'days';
    const num = n < 0 ? '!' : n;
    const HORIZON = 30;
    const pct = Math.max(0, Math.min(100, ((HORIZON - n) / HORIZON) * 100));
    const dateFmt = new Date(d.date + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    return `<div class="deadline ${cls}">
      <div class="count"><div class="n">${num}</div><div class="u">${label}</div></div>
      <div class="body"><div class="t">${esc(d.title)}</div><div class="d">${dateFmt} · ${esc(d.type||'')}</div>
        <div class="bar"><span style="width:${pct}%"></span></div>
      </div>
      <button class="block-btn" onclick="blockTime('${esc(d.title)}','${d.date}')">Block time</button>
    </div>`;
  }).join('');
}

function renderHiwis() {
  document.getElementById('hiwis').innerHTML = HIWIS.map(h => {
    const data = tasks[h.id];
    const horizons = HORIZONS.map(hz => {
      const list = data[hz.id] || [];
      const items = list.length ? list.map(t => taskRow(h.id, hz.id, t)).join('')
        : `<div class="empty">nothing here</div>`;
      return `<div class="horizon"><div class="h-lbl">${hz.label}</div>${items}</div>`;
    }).join('');
    return `<div class="hiwi">
      <h3>${h.name}</h3><div class="loc">${h.loc}</div>
      ${horizons}
      <div class="add-row">
        <button class="add-toggle" onclick="toggleAdd('${h.id}')">${ICON_PLUS} Add task</button>
        <div class="add-form" id="form-${h.id}">
          <input type="text" id="input-${h.id}" placeholder="Task description" />
          <select id="hz-${h.id}">${HORIZONS.map(x=>`<option value="${x.id}">${x.label}</option>`).join('')}</select>
          <div class="btns">
            <button class="confirm" onclick="addTask('${h.id}')">Add</button>
            <button class="cancel" onclick="toggleAdd('${h.id}')">Cancel</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function taskRow(hiwiId, hzId, t) {
  return `<div class="task ${t.done?'complete':''}">
    <div class="check ${t.done?'done':''}" onclick="toggleTask('${hiwiId}','${hzId}','${t.id}')">${t.done?ICON_CHECK:''}</div>
    <div class="txt">${esc(t.text)}</div>
    <button class="del" onclick="delTask('${hiwiId}','${hzId}','${t.id}')">${ICON_X}</button>
  </div>`;
}

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toggleTask(h, hz, id){
  const t = tasks[h][hz].find(x=>x.id===id); if(!t) return;
  t.done = !t.done; saveTasks(); renderAll();
}
function delTask(h, hz, id){
  tasks[h][hz] = tasks[h][hz].filter(x=>x.id!==id); saveTasks(); renderAll();
}
function toggleAdd(h){
  document.getElementById('form-'+h).classList.toggle('open');
}
function addTask(h){
  const inp = document.getElementById('input-'+h);
  const hz = document.getElementById('hz-'+h).value;
  const text = inp.value.trim(); if(!text) return;
  tasks[h][hz].push({ id: uid(), text, done: false });
  inp.value = ''; saveTasks(); renderAll();
  document.getElementById('form-'+h).classList.add('open');
}

// One-click time block: opens Google Calendar event creation prefilled.
function blockTime(title, dateStr){
  const start = dateStr.replace(/-/g,'');
  const url = `https://calendar.google.com/calendar/u/0/r/eventedit?text=${encodeURIComponent('Work: '+title)}&dates=${start}/${start}`;
  window.open(url, '_blank');
}

function renderAll(){ renderMetrics(); renderDeadlines(); renderHiwis(); }

// Calendar sync — works when running inside Claude (Anthropic API + MCP), silent fallback otherwise.
async function syncCalendar(){
  const btn = document.getElementById('sync-btn');
  btn.classList.add('syncing'); btn.disabled = true;
  setSync('local', 'Syncing…');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content:
          'List my upcoming calendar events from calendar ID "2" for the next 30 days. Respond ONLY with a raw JSON array (no markdown, no backticks) where each item has: title (string), date (YYYY-MM-DD), type (string).' }],
        mcp_servers: [{ type: 'url', url: 'https://calendarmcp.googleapis.com/mcp/v1', name: 'gcal' }],
      }),
    });
    if (!res.ok) throw new Error('no auth');
    const data = await res.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    if (Array.isArray(parsed) && parsed.length) {
      deadlines = parsed;
      setSync('live', 'Calendar synced');
      renderAll();
      btn.classList.remove('syncing'); btn.disabled = false;
      return;
    }
    throw new Error('empty');
  } catch (e) {
    setSync('local', 'Local mode');
  }
  btn.classList.remove('syncing'); btn.disabled = false;
}
function setSync(cls, txt){
  const el = document.getElementById('sync');
  el.className = 'sync-state ' + cls;
  document.getElementById('sync-txt').textContent = txt;
}

renderHeader();
renderAll();
syncCalendar();
</script>
</body>
</html>
